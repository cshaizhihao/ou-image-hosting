name: Docker

on:
  pull_request:
    paths:
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - apps/**
      - packages/**
      - .github/workflows/docker.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - apps/**
      - packages/**
      - .github/workflows/docker.yml

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api
          push: false
          tags: ou-image-hosting-api:ci
          cache-from: type=gha,scope=ou-image-hosting
          cache-to: type=gha,mode=max,scope=ou-image-hosting

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: web
          push: false
          tags: ou-image-hosting-web:ci
          cache-from: type=gha,scope=ou-image-hosting
          cache-to: type=gha,mode=max,scope=ou-image-hosting
